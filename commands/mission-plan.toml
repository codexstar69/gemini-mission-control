description = "Activate the mission planner to begin interactive planning"
prompt = """
Plan the active mission. Args: {{args}}

1. Find mission: if {{args}} has ID, use it; else most recent. No missions → "Use /mission-start first."
2. Read state.json. State must be `planning`; otherwise error with current state.
3. Get mission dir path and workingDirectory from state.json.
4. Call activate_skill to load `mission-planner`. Follow its 7-phase procedure to generate all artifacts and transition to `orchestrator_turn`.
"""
