description = "Display the current status of a mission"
prompt = """
Show mission status. Args: {{args}}

Use only read_file and list_directory tools (no external scripts).

1. Find mission:
   - If {{args}} has ID: try `~/.gemini-mc/missions/mis_{{args}}/state.json` then `~/.gemini-mc/missions/{{args}}/state.json`. Not found → error.
   - If empty: list `~/.gemini-mc/missions/`, read each state.json, pick most recent by updatedAt. None → "Use /mission-start."

2. Read features.json from same dir. Find first feature with status=`pending` → its milestone is current milestone. No pending → "all complete".

3. Display:
   Mission ID: <missionId>
   State: <state>
   Progress: <completedFeatures>/<totalFeatures> features
   Current Milestone: <milestone>
   Working Directory: <workingDirectory>
   Last Updated: <updatedAt>
"""
