description = "Export a mission as a tar.gz archive"
prompt = """
Export mission as tar.gz. Args: {{args}}

1. Find mission: if {{args}} has an ID, use it; else find most recent: `ls -td ~/.gemini-mc/missions/mis_*/ 2>/dev/null | head -1`. No missions → tell user.
2. Read state.json for missionId.
3. Create archive: `tar -czf ~/mission-<missionId>-export.tar.gz -C ~/.gemini-mc/missions <dir_name>`
4. Verify: `ls -lh ~/mission-<missionId>-export.tar.gz`
5. Display: Mission ID, archive path, size, "Mission exported successfully."
"""
