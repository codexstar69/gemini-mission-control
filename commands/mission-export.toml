description = "Export a mission as a tar.gz archive"
prompt = """
The user wants to export a mission as an archive. Arguments: {{args}}

Follow these steps:

1. Find the mission. If {{args}} contains a mission ID, use it. Otherwise, find the most recently updated mission:
   `ls -td ~/.gemini-mc/missions/mis_*/ 2>/dev/null | head -1`
   If no missions exist, tell the user: "No missions found. Nothing to export."

2. Read the mission's state.json to get the missionId and confirm the directory exists.

3. Determine the output path for the archive. The archive will be created at:
   ~/mission-<missionId>-export.tar.gz
   (in the user's home directory)

4. Create the tar.gz archive by running:
   `tar -czf ~/mission-<missionId>-export.tar.gz -C ~/.gemini-mc/missions <mission_directory_name>`

   Where <mission_directory_name> is the directory name (e.g., "mis_abc123"), not the full path.

5. Verify the archive was created successfully by running:
   `ls -lh ~/mission-<missionId>-export.tar.gz`

6. Display a summary to the user:
   - Mission ID: <missionId>
   - Archive: ~/mission-<missionId>-export.tar.gz
   - Size: <file size>
   - Contents: All state files, handoffs, artifacts, and progress logs
   - Message: "Mission exported successfully. The archive contains all mission data."

If the tar command fails, report the error to the user.
"""
