description = "Override a failed validator with documented justification"
prompt = """
Override failed validation. Justification: {{args}}

1. If {{args}} empty → "Please provide justification. Usage: /mission-override <justification>"
2. Find most recent mission (list dirs, compare updatedAt). No missions → tell user.
3. Read state.json and features.json.
4. Find failed validators: features with IDs matching `scrutiny-validator-*` or `user-testing-validator-*` with status=`pending` or failed handoff. None found → "No failed validators to override."
5. For each failed validator:
   a. Set status=`completed`, increment completedFeatures
   b. Update/create synthesis report at `.mission/validation/<milestone>/<type>/synthesis.json` with: `{"overridden":true,"overriddenAt":"<ISO>","justification":"{{args}}","originalResult":"..."}`
6. Seal milestones where BOTH scrutiny + user-testing validators now completed → add to sealedMilestones
7. Log `validation_overridden` event to progress_log.jsonl
8. Update updatedAt in state.json
9. Confirm: mission ID, overridden validators, justification, sealed milestones, "Continue with /mission-run"
"""
