description = "Pause the current mission execution"
prompt = """
Pause current mission. Args: {{args}}

1. Find mission: if {{args}} has ID, use it; else most recent. No missions → tell user.
2. Read state.json. Only pausable from: `orchestrator_turn`, `worker_running`, `handoff_review`. Other states → error.
3. Set state=`paused`, update updatedAt, write state.json.
4. Log to progress_log.jsonl: `{"event":"state_transition","from":"<prev>","to":"paused","reason":"user_requested"}`
5. Confirm: Mission ID, previous state, "Mission paused. Use /mission-resume to continue."
"""
