description = "Start the autonomous orchestrator run loop to dispatch workers"
prompt = """
The user wants to run the mission orchestrator. Arguments: {{args}}

Follow these steps:

1. Find the active mission. If {{args}} contains a mission ID, use it. Otherwise, find the most recently updated mission:
   `ls -td ~/.gemini-mc/missions/mis_*/ 2>/dev/null | head -1`
   If no missions exist, tell the user: "No missions found. Use /mission-start to create one first."

2. Read the mission's state.json to determine the current state. Check the "state" field:
   - If the state is "orchestrator_turn": proceed to step 3 — this is the normal starting state.
   - If the state is "worker_running" or "handoff_review": proceed to step 3 — the mission-orchestrator skill will perform crash recovery automatically.
   - If the state is "planning": display error: "This mission is still in planning state. Run /mission-plan first to complete planning before running."
   - If the state is "paused": display error: "This mission is paused. Run /mission-resume to resume execution first."
   - If the state is "completed": display error: "This mission is already completed. No further work to do."
   - If the state is "failed": display error: "This mission has failed. Check the progress log for details."
   Only proceed to step 3 if the state is "orchestrator_turn", "worker_running", or "handoff_review".

3. Read the mission's working directory from state.json. You will need both:
   - The mission directory path: ~/.gemini-mc/missions/mis_<id>/
   - The working directory path from state.json's workingDirectory field

4. Use activate_skill to load the mission-orchestrator skill. This will provide the complete autonomous run loop procedure:
   - Step 1: Read state and perform crash recovery if needed
   - Step 2: Evaluate the feature DAG for ready features
   - Step 3: Construct enriched worker prompts with context from .mission/ files
   - Step 4: Dispatch worker subagents for each ready feature
   - Step 5: Parse structured JSON handoffs from workers
   - Step 6: Apply the decision tree (Options A/B/C/D) based on outcomes
   - Step 7: Update state, log progress, write inter-agent messages
   - Step 8: Check milestone completion, inject validators, loop or complete

5. Follow the mission-orchestrator skill's instructions. The skill will manage the full execution lifecycle autonomously — dispatching workers, reviewing handoffs, updating state, and completing milestones — until all features are done or intervention is needed.

Begin by reading the mission state from the mission directory, then call activate_skill to load the mission-orchestrator skill and start the run loop.
"""
