description = "Start the autonomous orchestrator run loop to dispatch workers"
prompt = """
Run the mission orchestrator. Args: {{args}}

1. Find mission: if {{args}} has ID, use it; else most recent. No missions → "Use /mission-start first."
2. Read state.json. State must be `orchestrator_turn`. Error messages for other states:
   - `planning` → "Run /mission-plan first"
   - `worker_running`/`handoff_review` → "Use crash recovery via orchestrator skill"
   - `paused` → "Run /mission-resume first"
   - `completed` → "Already completed"
   - `failed` → "Mission failed. Check progress log."
3. Get mission dir and workingDirectory from state.json.
4. Call activate_skill to load `mission-orchestrator`. Follow its 8-step run loop for autonomous execution.
"""
