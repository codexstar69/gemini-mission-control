description = "Resume a paused mission"
prompt = """
Resume paused mission. Args: {{args}}

1. Find mission: if {{args}} has ID, use it; else most recent. No missions → tell user.
2. Read state.json. Must be `paused`; otherwise error.
3. Check progress_log.jsonl for budget_pause. If budget-paused → warn user about continued token usage, wait for acknowledgment.
4. Set state=`orchestrator_turn`, update updatedAt, write state.json.
5. Log: `{"event":"state_transition","from":"paused","to":"orchestrator_turn","reason":"user_requested"}`
6. Confirm: Mission ID, "Mission resumed. Run /mission-run to continue."
"""
